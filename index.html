<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Fola Adeleke® — Limited Edition Fine Art Prints</title>
  <meta name="description" content="Limited edition fine art prints by Fola Adeleke. Dropping soon." />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://www.folaadeleke.com/" />
  <meta property="og:title"       content="Fola Adeleke® — Limited Edition Fine Art Prints" />
  <meta property="og:description" content="Limited edition fine art prints by Fola Adeleke. Dropping soon." />
  <meta property="og:image"       content="https://www.folaadeleke.com/home-page.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Fola Adeleke® — Limited Edition Fine Art Prints" />
  <meta name="twitter:description" content="Limited edition fine art prints by Fola Adeleke. Dropping soon." />
  <meta name="twitter:image"       content="https://www.folaadeleke.com/home-page.png" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #000;
      --white: #fff;
      --grey-light: #eee;
      --grey-mid: #999;
      --font: 'Courier New', Courier, monospace;
      --spacing: 0.2em;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .brand {
      font-family: var(--font);
      font-size: clamp(16px, 3vw, 22px);
      font-weight: normal;
      letter-spacing: 0.35em;
      margin-bottom: 48px;
    }

    .rule {
      width: 48px;
      border: none;
      border-top: 1px solid var(--black);
      margin: 0 auto 48px;
    }

    .tagline {
      font-family: var(--font);
      font-size: clamp(11px, 2vw, 13px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--grey-mid);
      margin-bottom: 56px;
    }

    .shop-link {
      display: inline-block;
      margin-top: 32px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
      border-bottom: 1px solid var(--black);
      padding-bottom: 2px;
    }

    .shop-link:hover {
      color: var(--grey-mid);
      border-color: var(--grey-mid);
    }

    .email-form {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .email-form input[type="email"] {
      width: 100%;
      border: 1px solid var(--black);
      border-radius: 0;
      padding: 14px 16px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      outline: none;
      background: var(--white);
      color: var(--black);
      -webkit-appearance: none;
    }

    .email-form input[type="email"]::placeholder {
      color: var(--grey-mid);
    }

    .email-form input[type="email"]:focus {
      border-color: var(--black);
    }

    .btn-submit {
      width: 100%;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 14px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-submit:hover:not(:disabled) { opacity: 0.75; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .form-message {
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.1em;
      min-height: 18px;
    }

    .form-message.error   { color: #c00; }
    .form-message.success { color: var(--grey-mid); }

    .privacy-notice {
      font-family: var(--font);
      font-size: 9px;
      letter-spacing: 0.05em;
      color: var(--grey-mid);
      text-align: center;
      line-height: 1.6;
    }

    .success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .success-state.visible { display: flex; }

    .success-state p {
      font-family: var(--font);
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--grey-mid);
      line-height: 1.8;
    }

    footer {
      border-top: 1px solid var(--grey-light);
      padding: 20px;
      text-align: center;
    }

    footer p {
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--grey-mid);
    }

    /* ── COUNTDOWN ── */
    .countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0;
      margin-bottom: 48px;
    }

    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 64px;
    }

    .cd-num {
      font-family: var(--font);
      font-size: clamp(28px, 6vw, 52px);
      font-weight: normal;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .cd-unit--ms .cd-num {
      font-size: clamp(16px, 3vw, 26px);
      color: var(--grey-mid);
    }

    .cd-label {
      font-family: var(--font);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey-mid);
      margin-top: 6px;
    }

    .cd-sep {
      font-family: var(--font);
      font-size: clamp(24px, 5vw, 44px);
      line-height: 1;
      color: var(--grey-light);
      padding: 0 4px;
    }

    .cd-sep--ms {
      font-size: clamp(14px, 2.5vw, 22px);
      padding-top: 6px;
    }

    @media (max-width: 480px) {
      .email-form { max-width: 100%; }
      .cd-unit { min-width: 44px; }
      .cd-sep { padding: 0 2px; }
    }
  </style>
</head>
<body>

  <main>
    <h1 class="brand">Fola Adeleke®</h1>
    <hr class="rule" />
    <p class="tagline">Dropping Sunday — 12PM BST</p>

    <div class="countdown">
      <div class="cd-unit">
        <span class="cd-num" id="cd-days">00</span>
        <span class="cd-label">Days</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cd-hours">00</span>
        <span class="cd-label">Hrs</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cd-mins">00</span>
        <span class="cd-label">Mins</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cd-secs">00</span>
        <span class="cd-label">Secs</span>
      </div>
      <span class="cd-sep cd-sep--ms">:</span>
      <div class="cd-unit cd-unit--ms">
        <span class="cd-num" id="cd-ms">000</span>
        <span class="cd-label">Ms</span>
      </div>
    </div>

    <form class="email-form" id="emailForm" novalidate>
      <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" />
      <input
        type="email"
        name="email"
        id="emailInput"
        placeholder="Your email address"
        autocomplete="email"
        required
      />
      <button type="submit" class="btn-submit" id="submitBtn">Notify Me</button>
      <span class="form-message" id="formMessage"></span>
      <p class="privacy-notice">By signing up you agree to receive occasional emails from Fola Adeleke. No spam, unsubscribe anytime.</p>
    </form>

    <div class="success-state" id="successState">
      <p>You're on the list.<br>We'll be in touch.</p>
    </div>

    <a class="shop-link" id="shopLink" href="https://shop.folaadeleke.com" style="display:none;">Shop Now</a>

  </main>

  <footer>
    <p>© 2026 Fola Adeleke. All rights reserved.</p>
  </footer>

  <script>
    // ── COUNTDOWN ──
    (function() {
      var target = new Date('2026-04-19T11:00:00Z').getTime();
      function pad2(n) { return String(Math.floor(n)).padStart(2, '0'); }
      function pad3(n) { return String(Math.floor(n)).padStart(3, '0'); }
      function tick() {
        var diff = target - Date.now();
        if (diff <= 0) {
          document.querySelector('.countdown').style.display = 'none';
          document.querySelector('.tagline').textContent     = 'Available Now';
          document.getElementById('emailForm').style.display = 'none';
          document.getElementById('shopLink').style.display  = 'inline-block';
          return;
        }
        document.getElementById('cd-days').textContent  = pad2(Math.floor(diff / 86400000));
        document.getElementById('cd-hours').textContent = pad2(Math.floor((diff % 86400000) / 3600000));
        document.getElementById('cd-mins').textContent  = pad2(Math.floor((diff % 3600000) / 60000));
        document.getElementById('cd-secs').textContent  = pad2(Math.floor((diff % 60000) / 1000));
        document.getElementById('cd-ms').textContent    = pad3(diff % 1000);
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();

    var form      = document.getElementById('emailForm');
    var input     = document.getElementById('emailInput');
    var submitBtn = document.getElementById('submitBtn');
    var message   = document.getElementById('formMessage');
    var success   = document.getElementById('successState');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      var email = input.value.trim();

      if (!email || !email.includes('@')) {
        message.textContent = 'Please enter a valid email address.';
        message.className = 'form-message error';
        input.focus();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';
      message.textContent = '';
      message.className = 'form-message';

      fetch('https://formspree.io/f/xbdqgpda', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ email: email })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.ok || data.next) {
          form.style.display = 'none';
          success.classList.add('visible');
        } else {
          var errMsg = (data.errors && data.errors[0] && data.errors[0].message)
            ? data.errors[0].message
            : 'Something went wrong. Please try again.';
          message.textContent = errMsg;
          message.className = 'form-message error';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Notify Me';
        }
      })
      .catch(function() {
        message.textContent = 'Network error. Please check your connection and try again.';
        message.className = 'form-message error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Notify Me';
      });
    });
  </script>

</body>
</html>
