<!DOCTYPE html>

<head>

  <meta charset="UTF-8" />

  <title>Press &#8212; Fola Adeleke&#174;</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #000; --white: #fff; --grey-light: #eee; --grey-mid: #999; --font: 'Courier New', Courier, monospace; --spacing: 0.2em; --nav-height: 56px; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--white); color: var(--black); min-height: 100vh; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height); background: var(--white); border-bottom: 1px solid var(--grey-light); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 20px; z-index: 100; }
    .nav-left { display: flex; align-items: center; }
    .nav-right { display: flex; justify-content: flex-end; }
    .nav-brand { text-align: center; font-size: 13px; font-weight: normal; letter-spacing: var(--spacing); text-decoration: none; color: var(--black); }
    .nav-link { font-size: 11px; letter-spacing: var(--spacing); text-transform: uppercase; text-decoration: none; color: var(--black); font-family: var(--font); }
    .nav-link:hover { text-decoration: underline; }
    .hamburger { background: none; border: none; cursor: pointer; font-size: 20px; padding: 4px 8px 4px 0; color: var(--black); line-height: 1; }
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; left: -260px; width: 240px; height: 100%; background: var(--white); border-right: 1px solid var(--grey-light); z-index: 201; transition: left 0.3s ease; display: flex; flex-direction: column; padding: 80px 32px 40px; }
    .drawer.open { left: 0; }
    .drawer a, .drawer button { font-family: var(--font); font-size: 12px; letter-spacing: var(--spacing); text-transform: uppercase; text-decoration: none; color: var(--black); background: none; border: none; cursor: pointer; padding: 14px 0; border-bottom: 1px solid var(--grey-light); text-align: left; width: 100%; }
    .drawer a:last-child, .drawer button:last-child { border-bottom: none; }
    .drawer-close { position: absolute; top: 18px; right: 18px; font-size: 20px; background: none; border: none; cursor: pointer; color: var(--black); line-height: 1; }
    footer { border-top: 1px solid var(--grey-light); padding: 20px; text-align: center; }
    .footer-social { display: flex; justify-content: center; gap: 24px; margin-bottom: 12px; }
    .footer-social a { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--grey-mid); text-decoration: none; }
    .footer-social a:hover { color: var(--black); }
    footer p { font-size: 10px; letter-spacing: 0.08em; color: var(--grey-mid); }

    .press-wrap { min-height: calc(100vh - var(--nav-height) - 80px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 40px 80px; text-align: center; }
    .press-wrap h1 { font-size: 36px; font-weight: 200; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 28px; }
    .press-rule { width: 100%; max-width: 480px; border: none; border-top: 1px solid var(--grey-light); margin-bottom: 48px; }
    .press-list { list-style: none; width: 100%; max-width: 480px; }
    .press-item { padding: 24px 0; border-bottom: 1px solid var(--grey-light); }
    .press-item:first-child { border-top: 1px solid var(--grey-light); }
    .press-publication { font-size: 12px; letter-spacing: var(--spacing); text-transform: uppercase; margin-bottom: 6px; }
    .press-description { font-size: 10px; letter-spacing: 0.08em; color: var(--grey-mid); margin-bottom: 12px; line-height: 1.8; }
    .press-link { font-size: 10px; letter-spacing: var(--spacing); text-transform: uppercase; color: var(--black); text-decoration: none; border-bottom: 1px solid var(--grey-light); padding-bottom: 2px; transition: border-color 0.15s; }
    .press-link:hover { border-bottom-color: var(--black); }
    @media (max-width: 768px) { .press-wrap h1 { font-size: 24px; letter-spacing: 0.25em; } }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <button class="hamburger" aria-label="Open menu" onclick="openDrawer()">&#9776;</button>
    </div>
    <a class="nav-brand" href="/">Fola Adeleke&#174;</a>
    <div class="nav-right">
      <a class="nav-link" href="/contact">Contact</a>
    </div>
  </nav>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Close menu">&#x2715;</button>
    <a href="/">Home</a>
    <a href="/prints">Prints</a>
    <a href="/artist">Artist</a>
    <a href="/press" aria-current="page">Press</a>
    <a href="/contact">Contact</a>
  </div>

  <div class="press-wrap">
    <h1>Press</h1>
    <hr class="press-rule" />
    <ul class="press-list">
      <li class="press-item">
        <div class="press-publication">Monad NYC</div>
        <div class="press-description">First feature-length interview</div>
        <a class="press-link" href="https://www.monadnyc.com/home/fola" target="_blank" rel="noopener">Read</a>
      </li>
      <li class="press-item">
        <div class="press-publication">Deeds Magazine</div>
        <div class="press-description">Instagram feature</div>
        <a class="press-link" href="https://www.instagram.com/p/DZrKtDFjZ6c/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==" target="_blank" rel="noopener">View</a>
      </li>
    </ul>
  </div>

  <footer>
    <div class="footer-social">
      <a href="https://www.instagram.com/fola_adeleke" target="_blank" rel="noopener">Instagram</a>
      <a href="https://www.tiktok.com/@folaadeleke" target="_blank" rel="noopener">TikTok</a>
    </div>
    <p>&#169; 2026 Fola Adeleke&#174;. All rights reserved.</p>
  </footer>

  <script>
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('open');
    }
  </script>

  <!-- ── Music node ───────────────────────────── -->
  <style>
    #music-node { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; align-items: center; gap: 10px; }
    #music-pill { display: flex; align-items: center; gap: 8px; font-family: 'Courier New', Courier, monospace; font-size: 10px; letter-spacing: 0.18em; color: #999; white-space: nowrap; background: #fff; border: 1px solid #e0e0e0; border-radius: 24px; padding: 6px 12px; opacity: 0; transform: translateX(8px); transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; }
    #music-node:hover #music-pill, #music-node.playing #music-pill { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #music-label { text-decoration: none; color: #999; transition: color 0.15s; }
    #music-label:hover { color: #000; }
    #music-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ccc; background: #fff; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.2s, transform 0.15s; position: relative; }
    #music-btn:hover { border-color: #000; transform: scale(1.06); }
    #music-node.playing #music-btn { border-color: #000; }
    #music-node.playing #music-btn::after { content: ''; position: absolute; inset: -1px; border-radius: 50%; border: 1px solid #999; animation: music-pulse 2s ease-out infinite; }
    @keyframes music-pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2); opacity: 0; } }
  </style>
  <div id="music-node">
    <div id="music-pill">
      <a id="music-label" href="https://open.spotify.com/playlist/2EvrAgnHW9v3V2P5GMELXu" target="_blank" rel="noopener noreferrer">Fola's vibe</a>
    </div>
    <button id="music-btn" aria-label="Play / pause">
      <svg id="icon-play" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3 2L10 6L3 10V2Z" fill="currentColor"/></svg>
      <svg id="icon-pause" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true" style="display:none"><rect x="2.5" y="2" width="2.5" height="8" rx="1" fill="currentColor"/><rect x="7" y="2" width="2.5" height="8" rx="1" fill="currentColor"/></svg>
    </button>
    <iframe id="music-iframe" src="" width="0" height="0" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" style="display:none"></iframe>
  </div>
  <script>
    (function () {
      var node = document.getElementById('music-node');
      var btn = document.getElementById('music-btn');
      var iframe = document.getElementById('music-iframe');
      var iconPlay = document.getElementById('icon-play');
      var iconPause = document.getElementById('icon-pause');
      var playing = false, controller = null;
      window.onSpotifyIframeApiReady = function (IFrameAPI) {
        IFrameAPI.createController(iframe, { uri: 'spotify:playlist:2EvrAgnHW9v3V2P5GMELXu', width: 0, height: 0 }, function (c) {
          controller = c;
          if (sessionStorage.getItem('music_playing') === '1') {
            playing = true; node.classList.add('playing');
            iconPlay.style.display = 'none'; iconPause.style.display = '';
            controller.resume();
          }
        });
      };
      btn.addEventListener('click', function () {
        if (!controller) return;
        if (playing) { controller.pause(); node.classList.remove('playing'); iconPlay.style.display = ''; iconPause.style.display = 'none'; sessionStorage.removeItem('music_playing'); }
        else { controller.resume(); node.classList.add('playing'); iconPlay.style.display = 'none'; iconPause.style.display = ''; sessionStorage.setItem('music_playing', '1'); }
        playing = !playing;
      });
    })();
  </script>
  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>

</body>
</html>
