<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscribe — Fola Adeleke®</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #000000;
      --white:      #ffffff;
      --grey-light: #eeeeee;
      --grey-mid:   #999999;
      --font:       'Courier New', Courier, monospace;
    }

    html, body {
      height: 100%;
      background: var(--white);
    }

    body {
      font-family: var(--font);
      color: var(--black);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      background: var(--white);
      text-align: center;
    }

    /* ── the beehiiv iframe ── */
    .beehiiv-wrap {
      line-height: 0; /* removes phantom gap under iframe */
    }

    .beehiiv-wrap iframe {
      display: block;
      width: 100% !important;
      max-width: 100% !important;
      height: 315px;
      border: none;
      background: transparent;
    }

    /* ── footer consent below iframe ── */
    .embed-footer {
      padding: 10px 32px 16px;
      border-top: 1px solid var(--grey-light);
    }

    .embed-consent {
      font-size: 8px;
      letter-spacing: 0.07em;
      color: var(--grey-mid);
      line-height: 1.9;
    }

    .embed-consent a {
      color: var(--grey-mid);
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .embed-header { padding: 20px 20px 16px; }
      .embed-footer { padding: 10px 20px 16px; }
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <!-- beehiiv iframe -->
    <div class="beehiiv-wrap">
      <script async src="https://subscribe-forms.beehiiv.com/embed.js"></script>
      <iframe
        src="https://subscribe-forms.beehiiv.com/b64503cb-8e19-4aec-9d50-a7a707588ca5"
        class="beehiiv-embed"
        data-test-id="beehiiv-embed"
        frameborder="0"
        scrolling="no"
        style="width:100%; height:180px; margin:0; border-radius:0 !important; background-color:transparent; box-shadow:0 0 #0000; max-width:100%; display:block;">
      </iframe>
    </div>

    <!-- themed footer -->
    <div class="embed-footer">
      <p class="embed-consent">
        By subscribing you agree to receive emails from Fola Adeleke.
        <a href="/unsubscribe.html" target="_parent">Unsubscribe</a> any time.
      </p>
    </div>

  </div>

</body>
</html>
